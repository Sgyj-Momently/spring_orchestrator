spring:
  profiles:
    default: memory,stub-agents

logging:
  level:
    org.springframework.web: INFO
    org.springframework.web.client: INFO

agents:
  photo-info:
    pipeline:
      python-executable: python3
      script-path: ../photo_exif_llm_pipeline/src/run_pipeline.py
      input-root: ../photo_exif_llm_pipeline/input_photos
      output-root: ../photo_exif_llm_pipeline/output/orchestrator
      ollama-base-url: http://localhost:11434
      vision-model: qwen2.5vl:7b
      writer-model: qwen2.5:14b
      ollama-timeout-seconds: 180
      skip-blog: true
  photo-grouping:
    base-url: http://127.0.0.1:8000
    endpoint: /api/v1/photo-groups
  privacy-safety:
    base-url: http://127.0.0.1:8700
    endpoint: /api/v1/privacy-safety
  quality-score:
    base-url: http://127.0.0.1:8800
    endpoint: /api/v1/quality-scores
  hero-photo:
    base-url: http://127.0.0.1:8200
    endpoint: /api/v1/hero-photos
  outline:
    base-url: http://127.0.0.1:8300
    endpoint: /api/v1/outlines
  draft:
    base-url: http://127.0.0.1:8400
    endpoint: /api/v1/drafts
  style:
    base-url: http://127.0.0.1:8500
    endpoint: /api/v1/styles
  review:
    base-url: http://127.0.0.1:8600
    endpoint: /api/v1/reviews
